[[server]]
name = "kiwiserver"
tags = ["KiwiServer"]
[server.config]
address = "https://10.1.10.5:8120"
enabled = true
send_mem_alerts = false
mem_warning = 95.0
mem_critical = 98.0

##

[[stack]]
name = "apt-sync"
tags = ["KiwiServer"]
[stack.config]
server = "kiwiserver"
linked_repo = "komodo-ops"
run_directory = "stacks/kiwiserver/apt-sync"

##

[[stack]]
name = "immich"
tags = ["KiwiServer"]
[stack.config]
server = "kiwiserver"
poll_for_updates = true
linked_repo = "komodo-ops"
run_directory = "stacks/kiwiserver/immich"
compose_cmd_wrapper = "sops exec-env [[SECRET_ENV_PATH]] '[[COMPOSE_COMMAND]]'"
compose_cmd_wrapper_include = ["config", "pull", "up"]

