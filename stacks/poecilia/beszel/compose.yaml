services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    environment:
      APP_URL: https://beszel.${DOMAIN_INT}
    ports:
      - 38090:8090
    volumes:
      - ${DOCKER_DATA}/beszel/beszel-hub/data:/beszel_data
      - ${DOCKER_DATA}/beszel/beszel_socket:/beszel_socket
    networks:
      - traefik-poecilia_local_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel-hub.rule=Host(`beszel.${DOMAIN_INT}`)"
      - "traefik.http.services.beszel-hub.loadbalancer.server.port=8090"
    # healthcheck:
    #   test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
    #   interval: 120s
    #   start_period: 10s
    #   timeout: 5s

  beszel-agent:
    image: henrygd/beszel-agent:alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DOCKER_DATA}/beszel/beszel-agent/data:/var/lib/beszel-agent
      - ${DOCKER_DATA}/beszel/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    devices:
      - /dev/nvme0:/dev/nvme0
      - /dev/nvme1:/dev/nvme1
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:38090
      TOKEN: ${BESZEL_AGENT_TOKEN}
      KEY: ${BESZEL_AGENT_KEY}
    # healthcheck:
    #   test: ['CMD', '/agent', 'health']
    #   interval: 120s

networks:
  traefik-poecilia_local_web:
    external: true
