services:
  technitium-primary:
    container_name: technitium-primary
    hostname: technitium-dns
    image: technitium/dns-server:15.2.0@sha256:23d3b63d959e997800b095fe93009b3fae271b5258234ff2ade8535cb33682c8
    network_mode: host
    # just useless config
    ports:
      - 5380:5380/tcp #DNS web console (HTTP)
      # - "53443:53443/tcp" #DNS web console (HTTPS)
    environment:
      - DNS_SERVER_LOG_USING_LOCAL_TIME=true
    volumes:
      - $DOCKER_DATA/technitium-dns/config:/etc/dns
    restart: always
    #sysctls:
    #  - net.ipv4.ip_local_port_range=1024 65000
  keepalived:
    image: shawly/keepalived:edge-4a11a97@sha256:3c9abead7cd9bc97e07624732b2eafd324e070ce38616b955f1b4f665d2659fa
    restart: always
    environment:
      TZ: Asia/Tokyo
      # change to primary LAN interface used by the host
      KEEPALIVED_INTERFACE: enp3s0
      # Host IP of the other machine (Secondary Technitium Server)
      KEEPALIVED_CHECK_IP: 10.1.10.5
      KEEPALIVED_VIRTUAL_IP: 10.1.10.2
      KEEPALIVED_VIRTUAL_MASK: 24
      # DNS check port
      KEEPALIVED_CHECK_PORT: 53
      KEEPALIVED_VRID: 150

      KEEPALIVED_PRIORITY: 255
      KEEPALIVED_STATE: MASTER
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
networks: {}
