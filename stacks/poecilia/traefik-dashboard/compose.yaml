services:
  traefik-dashboard:
    image: hhftechnology/traefik-log-dashboard:2.0@sha256:1e6ca95104cb0162fc713bbc90ec49eda792f6b5c73d607c8c75e56854c53313
    container_name: traefik-dashboard
    # ports:
    #   - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AGENT_API_URL=http://${IP_NIXOS_RL}:53948
      - AGENT_API_TOKEN=${TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN}
    networks:
      - traefik-poecilia_local_web
    labels:
      traefik.enable: true
      traefik.http.routers.traefik-dashboard.rule: Host(`traefik-dashboard.${DOMAIN_INT}`)
      traefik.http.services.traefik-dashboard.loadbalancer.server.port: 3000
      traefik.docker.network: traefik-poecilia_local_web

networks:
  traefik-poecilia_local_web:
    external: true
