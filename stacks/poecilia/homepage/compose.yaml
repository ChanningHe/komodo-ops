services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    container_name: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      # - PUID=${PM_RT_UID}
      # - PGID=${PM_RT_GID}
    volumes:
      - $DOCKER_DATA/homepage/config:/app/config
      - $DOCKER_DATA/homepage/icons:/app/public/icons
      - $DOCKER_DATA/homepage/images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 53300:3000
    restart: unless-stopped
    # labels:
    #   - diun.enable=true
networks: {}
