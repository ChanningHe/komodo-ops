services:

  traefik-kop-local:
    image: "ghcr.io/jittering/traefik-kop:0.19.4@sha256:e772673cc437070646229354e55fb1b5b348cf4d7fade5514e3b61c1f3d0b319"
    restart: unless-stopped
    environment:
      - "REDIS_ADDR=${IP_POECILIA}:6379"
      - "DOCKER_HOST=tcp://socket-proxy:2375"
      - "KOP_HOSTNAME=${HOSTNAME:-generic}-local"
      - "BIND_IP=${IP_KIWISERVER}"
      - "NAMESPACE=poecilia"
    depends_on:
      - socket-proxy
    networks:
      - kop_net

  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.2.17@sha256:a8f16b7a30a6863fe5caf4750ae86f53e59de6600069f21b6d7592fdec031683
    container_name: socket-proxy
    networks:
      - kop_net
    environment:
      - CONTAINERS=1
      - POST=0
      - NODE=1
      - INFO=1
      #- PING=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # ports:
    #   - 2375:2375
    restart: always
    read_only: true
    tmpfs:
      - /run

networks:
  kop_net: