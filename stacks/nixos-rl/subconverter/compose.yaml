services:
  subweb-old:
    image: careywong/subweb:latest
    container_name: subweb-old
    ports:
      - "39430:80"
    restart: always
    networks:
      - traefik_external_public_web
    environment:
      - VUE_APP_SUBCONVERTER_DEFAULT_BACKEND=${DOMAIN_SUBCONVERTER_WEB}
  subweb-new:
    image: stilleshan/subweb
    container_name: subweb-new
    ports:
      - "39234:80"
    restart: always
    volumes:
      #- $DOCKER_DATA/subconverter/config/config.js:/app/public/conf/config.js
      - $DOCKER_DATA/subconverter/subweb-new/config/config.js:/usr/share/nginx/html/conf/config.js
    networks:
      - traefik_external_public_web
    environment:
      - API_URL=https://${DOMAIN_SUBCONVERTER_API}
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.docker.network: traefik_external_public_web
      #-----
      traefik.http.routers.sbct-web.rule: Host(`${DOMAIN_SUBCONVERTER_WEB}`)
      traefik.http.routers.sbct-web.entrypoints: cf
      traefik.http.services.sbct-web.loadbalancer.server.port: 80
      traefik.http.routers.sbct-web.service: sbct-web
      traefik.http.routers.sbct-web.middlewares: tinyauth
      # #---cloudflared---
      # dockflare.enable: "true"
      # dockflare.0.hostname: ${DOMAIN_SUBCONVERTER_WEB}
      # dockflare.0.service: http://traefik:808
      # dockflare.0.zonename: ${DOMAIN_HSC}
      # dockflare.access.group: public-default-bypass
      labelgate.tunnel.sub-web.hostname: ${DOMAIN_SUBCONVERTER_WEB}
      labelgate.tunnel.sub-web.service: http://traefik:808


  subconverter:
    #image: ghcr.io/metacubex/subconverter:latest
    image: asdlokj1qpi23/subconverter:latest
    container_name: subconverter
    ports:
      - "15051:25500"
    restart: always
    networks:
      - traefik_external_public_web
    volumes:
      - $DOCKER_DATA/subconverter/backend-api/config:/base
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.docker.network: traefik_external_public_web
      #-----
      traefik.http.routers.subconverter.rule: Host(`${DOMAIN_SUBCONVERTER_API}`)
      traefik.http.routers.subconverter.entrypoints: cf
      traefik.http.services.subconverter.loadbalancer.server.port: 25500
      traefik.http.routers.subconverter.service: subconverter
      # #---cloudflared---
      # dockflare.enable: "true"
      # dockflare.0.hostname: ${DOMAIN_SUBCONVERTER_API}
      # dockflare.0.service: http://traefik:808
      # dockflare.0.zonename: ${DOMAIN_HSC}
      # dockflare.access.group: public-default-bypass
            # --- labelgate --- #
      labelgate.tunnel.subconverter.hostname: ${DOMAIN_SUBCONVERTER_API}
      labelgate.tunnel.subconverter.service: http://traefik:808

networks: 
  traefik_external_public_web:
    external: true
