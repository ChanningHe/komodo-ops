      - "BIND_IP=${IP_NIXOS_RL}"
      - "NAMESPACE=poecilia"
    # depends_on:
    #   - socket-proxy
    # networks:
    #   - kop_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
