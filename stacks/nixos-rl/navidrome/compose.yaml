services:
  navidrome:
    image: deluan/navidrome:latest
    #user: 0:0
    ports:
      - 34533:4533
    restart: unless-stopped
    environment:
      # Optional: put your config options customization here. Examples:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_SCANNER_PURGEMISSING: always
    volumes:
      - type: bind
        source: $DOCKER_DATA/navidrome/data
        target: /data
      #- $DOCKER_DATA/navidrome/data:/data
      - $PATH_MEDIACENTRE/Music:/music:ro
    networks:
      - traefik_external_public_web
      - default
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.docker.network: traefik_external_public_web
      #-----
      traefik.http.routers.navidrome.rule: Host(`navidrome.${DOMAIN_HISC}`)
      traefik.http.routers.navidrome.entrypoints: cf
      traefik.http.services.navidrome.loadbalancer.server.port: 4533
      traefik.http.routers.navidrome.service: navidrome
      #----
      # dockflare.enable: "true"
      # dockflare.0.hostname: navidrome.${DOMAIN_HISC}
      # dockflare.0.service: http://traefik:808
      # dockflare.0.zonename: ${DOMAIN_HISC}
      # dockflare.access.group: public-default-bypass
      labelgate.tunnel.navidrome.hostname: navidrome.${DOMAIN_HISC}
      labelgate.tunnel.navidrome.service: http://traefik:808

networks:
  default: {}
  traefik_external_public_web:
    external: true
