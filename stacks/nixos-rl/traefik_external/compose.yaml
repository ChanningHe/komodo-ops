services:
  traefik:
    image: "traefik:v3.6@sha256:f79c88ed5252ae1e31c757a9796d751461ddb502437b8d8526db9e12605a82eb"
    restart: always
    networks:
      - public_web
      - traefik_ex_admin
      - crowdsec_net
    depends_on:
      - traefik-external-redis
    command: --api.insecure=true --providers.docker
    env_file: ./.env
    ports:
      #- "0.0.0.0:80:80"
      #- "[::]:80:80"
      - "0.0.0.0:443:443"
      - "[::]:443:443"
      - "31080:8080"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - $DOCKER_DATA/traefik_external/traefik/letsencrypt:/letsencrypt
      - $DOCKER_DATA/traefik_external/traefik/certificates:/certificates
      - $DOCKER_DATA/traefik_external/traefik/log:/var/log/traefik:rw
      - $DOCKER_DATA/traefik_external/traefik/static_config:/etc/traefik:rw
      - $DOCKER_DATA/traefik_external/traefik/dynamic_config:/config/dynamic:rw
      - $DOCKER_DATA/traefik_external/traefik/ban.html:/config/ban.html:ro
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      kop.poecilia.traefik.enable: true
      kop.poecilia.traefik.http.routers.traefik-dashboard-external.rule: Host(`traefik-public.${DOMAIN_INT}`)
      kop.poecilia.traefik.http.routers.traefik-dashboard-external.entrypoints: websecure
      kop.poecilia.traefik.http.services.traefik-dashboard-external.loadbalancer.server.port: 31080
      kop.poecilia.traefik.http.routers.traefik-dashboard-external.service: traefik-dashboard-external
      kop.namespace: poecilia
      #homepage settings
      homepage.group: Monitoring
      homepage.name: Traefik (Public)
      homepage.icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/traefik.png
      homepage.href: "https://traefik-public.${DOMAIN_INT}"
      homepage.widget.type: traefik
      homepage.widget.url: https://traefik-public.${DOMAIN_INT}

  logrotate:
    image: vegardit/traefik-logrotate:latest@sha256:a1dda881ae7c4d0ec1a862d87360aea125460775f8e804b5c0519d875d58d5fb
    network_mode: none
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw # required to send USR1 signal to Traefik after log rotation
      - $DOCKER_DATA/traefik_external/traefik/log:/var/log/traefik:rw # folder containing access.log file
    environment:
      TZ: "${LOCAL_TZ}"
      # all environment variables are optional and show the default values:
      LOGROTATE_LOGS: "/var/log/traefik/*.log" # log files to rotate, directory must match volume mount
      LOGROTATE_TRIGGER_INTERVAL: monthly # rotate daily, must be one of: daily, weekly, monthly, yearly
      LOGROTATE_TRIGGER_SIZE: 50M # rotate if log file size reaches 50MB
      LOGROTATE_MAX_BACKUPS: 7 # keep 14 backup copies per rotated log file
      LOGROTATE_START_INDEX: 1 # first rotated file is called access.1.log
      LOGROTATE_FILE_MODE: 0644 # file mode of the rotated file
      LOGROTATE_FILE_USER: root # owning user of the rotated file
      LOGROTATE_FILE_GROUP: root # owning group of the rotated file
      CRON_SCHEDULE: "* * * * *"
      CRON_LOG_LEVEL: 8 # see https://unix.stackexchange.com/a/414010/378036
      # command to determine the id of the container running Traefik:
      TRAEFIK_CONTAINER_ID_COMMAND: docker ps --no-trunc --quiet --filter label=org.opencontainers.image.title=Traefik

  traefik-access-logs:
    image: alpine:3.23.4@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    container_name: traefik-external-access-logs
    volumes:
      - $DOCKER_DATA/traefik_external/traefik/log:/var/log:ro
    command: >
      sh -c "tail -F /var/log/access.log"
    network_mode: none
    restart: unless-stopped

  traefik-external-redis:
    restart: always
    image: redis:7-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee
    container_name: traefik-external-redis
    ports:
      - "6379:6379"
    networks:
      - traefik_ex_admin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    volumes:
      - $DOCKER_DATA/traefik_external/redis:/data

  cloudflare_tunnel:
    image: cloudflare/cloudflared:2026.2.0@sha256:404528c1cd63c3eb882c257ae524919e4376115e6fe57befca8d603656a91a4c
    restart: unless-stopped
    command: tunnel run --token ${TRAEFIK_EX_CFTUNNEL_PUBLIC_TOKEN} --protocol http2
    #command: tunnel run
    # environment:
    #     TUNNEL_METRICS: 0.0.0.0:20241
    #     TUNNEL_TOKEN: ${TRAEFIK_EX_CFTUNNEL_PUBLIC_TOKEN}
    networks:
        - public_web

  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.2.17@sha256:a8f16b7a30a6863fe5caf4750ae86f53e59de6600069f21b6d7592fdec031683
    container_name: traefik-ext-socket-proxy
    networks:
      - crowdsec_net
      - kop_net
    environment:
      - CONTAINERS=1
      - POST=0
      - NODE=1
      - INFO=1
      #- PING=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 2375:2375
    restart: always
    read_only: true
    tmpfs:
      - /run

  # newt:
  #   image: fosrl/newt:latest
  #   container_name: newt
  #   restart: unless-stopped
