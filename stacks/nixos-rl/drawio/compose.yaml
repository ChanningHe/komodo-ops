version: '3.5'
services:
  drawio:
    image: jgraph/drawio:30.0.2@sha256:c01c93e16bcd52db3339269bf6c5826e4568a0e266b669fcac49d56f305e6653
    container_name: drawio
    restart: unless-stopped
    ports:
      - 36711:8080
      #- 8443:8443
    #environment:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://domain:8080 || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 10s