services:
  cinemore-server:
    container_name: cinemore-server
    image: cinemore/cinemore-server:latest@sha256:a48fd4dcd337dec3bb9d4b578ffed188f827c15208292e3069e0694956aa52b7
    restart: always
    ports:
      - "38824:8000"
    volumes:
      - $DOCKER_DATA/cinemore/server/data:/app/data
      - $PATH_MEDIACENTRE:/media
    labels:
      kop.poecilia.traefik.enable: true
      kop.poecilia.traefik.http.routers.cinemore.rule: Host(`cinemore.${DOMAIN_INT}`)
      kop.poecilia.traefik.http.routers.cinemore.entrypoints: websecure
      kop.poecilia.traefik.http.services.cinemore.loadbalancer.server.port: 38824
      kop.namespace: poecilia