  ghproxy:
    image: 'wjqserver/ghproxy:4.3.4@sha256:c0857d824954ffd80b558f6c246178f0093bcce7664eb5a6fec340061b3ed2d7'
    restart: always
    container_name: ghproxy
    volumes:
        - '$DOCKER_DATA/registry-proxy/ghproxy/log:/data/ghproxy/log'
        - '$DOCKER_DATA/registry-proxy/ghproxy/config:/data/ghproxy/config'
    #ports:
    #    - '7210:8080'
    networks:
      - registry-net
      - traefik_external_public_web
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.docker.network: traefik_external_public_web
      traefik.http.routers.gh-mirrors.rule: Host(`gh-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.gh-mirrors.entrypoints: cf
      traefik.http.services.gh-mirrors.loadbalancer.server.port: 8080
      #---local
      traefik.http.routers.gh-mirrors-local.rule: Host(`gh-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.gh-mirrors-local.entrypoints: https
      traefik.http.routers.gh-mirrors-local.service: gh-mirrors
      #---cloudflared---
      # dockflare.enable: "true"
      # dockflare.0.hostname: gh-mirrors.${DOMAIN_HLC}
      # dockflare.0.service: http://traefik:808
      # dockflare.access.group: public-default-bypass
      labelgate.tunnel.gh-mirrors.hostname: gh-mirrors.${DOMAIN_HLC}
      labelgate.tunnel.gh-mirrors.service: http://traefik:808

  ## UI
  registry-ui:
    container_name: registry-ui
    image: dqzboy/docker-registry-ui:latest@sha256:17289ed43e4c140dd4f2b637947785f90370cac1c8e805007a1cf213d031f767
    environment:
      - DOCKER_REGISTRY_URL=http://reg-docker-hub:5000
      # [必须]使用 openssl rand -hex 16 生成唯一值
      - SECRET_KEY_BASE=${REGISTRYPROXY_SECRET_KEY_BASE}
      # 启用Image TAG 的删除按钮
      - ENABLE_DELETE_IMAGES=true
      - NO_SSL_VERIFICATION=true
    restart: always
    ports:
      - 50000:8080
    networks:
      - registry-net

networks:
  registry-net:
  traefik_external_public_web:
    external: true