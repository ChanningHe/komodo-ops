services:
  ## docker hub
  dockerhub:
    container_name: reg-docker-hub
    image: dqzboy/registry:latest@sha256:d3ddc3b3e391254b20209872c60c83d448162332f92a9635be1ca1f0a1b89be5
    restart: always
    environment:
      - OTEL_TRACES_EXPORTER=none
      #- http=http://host:port
      #- https=http://host:port
    volumes:
      - $DOCKER_DATA/registry-proxy/registry/data:/var/lib/registry
      - $DOCKER_DATA/registry-proxy/config/registry-hub.yml:/etc/distribution/config.yml
      #- ./htpasswd:/auth/htpasswd
    ports:
      - 51000:5000
    networks:
      - registry-net
      - traefik_external_public_web
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.http.routers.dh-mirrors.rule: Host(`dh-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.dh-mirrors.entrypoints: cf
      traefik.http.services.dh-mirrors.loadbalancer.server.port: 5000
      #---local
      traefik.http.routers.dh-mirrors-local.rule: Host(`dh-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.dh-mirrors-local.entrypoints: https
      traefik.http.routers.dh-mirrors-local.service: dh-mirrors
      #---cloudflared---
      # dockflare.enable: "true"
      # dockflare.0.hostname: dh-mirrors.${DOMAIN_HLC}
      # dockflare.0.service: http://traefik:808
      # dockflare.access.group: public-default-bypass
      labelgate.tunnel.dh-mirrors.hostname: dh-mirrors.${DOMAIN_HLC}
      labelgate.tunnel.dh-mirrors.service: http://traefik:808
      traefik.docker.network: traefik_external_public_web

  ## ghcr.io
  ghcr:
    container_name: reg-ghcr
    image: dqzboy/registry:latest@sha256:d3ddc3b3e391254b20209872c60c83d448162332f92a9635be1ca1f0a1b89be5
    restart: always
    environment:
      - OTEL_TRACES_EXPORTER=none
      #- http=http://host:port
      #- https=http://host:port
    volumes:
      - $DOCKER_DATA/registry-proxy/registry/data:/var/lib/registry
      - $DOCKER_DATA/registry-proxy/config/registry-ghcr.yml:/etc/distribution/config.yml
      #- ./htpasswd:/auth/htpasswd
    ports:
      - 52000:5000
    networks:
      - registry-net
      - traefik_external_public_web
    labels:
      traefik.enable: true
      traefik.public: true
      traefik.http.routers.ghcr-mirrors.rule: Host(`ghcr-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.ghcr-mirrors.entrypoints: cf
      traefik.http.services.ghcr-mirrors.loadbalancer.server.port: 5000
      #---local
      traefik.http.routers.ghcr-mirrors-local.rule: Host(`ghcr-mirrors.${DOMAIN_HLC}`)
      traefik.http.routers.ghcr-mirrors-local.entrypoints: https
      traefik.http.routers.ghcr-mirrors-local.service: ghcr-mirrors
      # #---cloudflared---
      # dockflare.enable: "true"
      # dockflare.0.hostname: ghcr-mirrors.${DOMAIN_HLC}
      # dockflare.0.service: http://traefik:808
      # dockflare.access.group: public-default-bypass
      labelgate.tunnel.ghcr-mirrors.hostname: ghcr-mirrors.${DOMAIN_HLC}
      labelgate.tunnel.ghcr-mirrors.service: http://traefik:808
      traefik.docker.network: traefik_external_public_web
